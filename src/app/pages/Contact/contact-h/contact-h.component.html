<div class="well">
    <button class="btn btn-danger" (click)="refresh1()"><i class="material-icons">refresh</i></button>
      
      <div class="row" *ngFor="let i of list;let j = index">
      
        <div class="col-xs-10" style="background-color: orange;margin-bottom: 10px;color:black">
        
          <h3 style="text-align: center;color:black;">{{i.tno}}</h3>
          <h4>{{i.loadingDate|date:'dd-MM-yyyy'}} -- {{i.place}}</h4>

        </div>
        <div class="col-xs-2" style="text-align: center;font-size: 30px;color:black">
          
          <div class="row bg-success" style="background-color: #198754;">
          <i class="material-icons" (click)="callMe(i,j)">call</i>
          </div>

          <div class="row" style="background-color: #dc3545;">
            <i class="material-icons" (click)="savePayment(i,j)" data-toggle="modal" data-target="#myModalPay">location_on</i>
          </div>
        </div>

      </div>
    <!-- </div> -->
</div>


  <div class="modal fade" id="myModalPay" role="dialog">
              <div class="modal-dialog" style="width: 50%;">
              
            
                <div class="modal-content" style="background-color: black;color: wheat;">
                  <div class="modal-header">
                    <button style="color:black;" type="button" class="close" data-dismiss="modal">&times;</button>
                    <h4 class="modal-title">Current Location</h4>
                  </div>
                  <div class="modal-body">
                    <div class="row">
                      <div class="col-sm-6">
                    <div class="row">
                      Date : <input style="color:wheat;background-color: black;" type="date" class="form-control" [(ngModel)]="date">
                    </div>
            
                    <div class="row">
                      Location : <input style="color:wheat;background-color: black;" type="text" class="form-control" [(ngModel)]="location">
                    </div>
                    <div class="row">
                      <table>
                        <tr *ngFor="let i of currentLocation;let j=index;">
                          <th><button style="width: 100%;" class="btn btn-danger" (click)="del(j)">{{i.date|date:'dd-MM-yyyy'}}->{{i.location}}</button></th>
                        </tr>
                      </table>
                    </div>
                  </div>

                  </div>
                  </div>
                  <div class="modal-footer">
                    <button style="color:black;" class="btn btn-success" (click)="complete()">Complete</button>
                    <button style="color:black;" class="btn btn-warning" (click)="add()">Store</button>
                    <button style="color:black;" type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
                  </div>
                </div>
                
              </div>
            </div>
